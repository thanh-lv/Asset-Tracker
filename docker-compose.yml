services:
  asset-tracker:
    build: .
    container_name: asset-tracker
    ports:
      - "3000:3000"  # chi nghe tren localhost -> tren EC2 truy cap qua SSH tunnel
    volumes:
      - ./data:/app/data     # giu db.json (lich su gia + tai san) tren may host
    environment:
      - PORT=3000
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - CMC_API_KEY=${CMC_API_KEY:-}          # key free tu pro.coinmarketcap.com (cho BTC/ETH)
      - CMC_CONVERT=${CMC_CONVERT:-VND}        # dong tien quy doi: VND, USD, ...
      - BTMH_CODE=${BTMH_CODE:-KGB}           # ma san pham vang BTMH
    restart: unless-stopped
